name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install
        env:
          npm_config_user_agent: pnpm

      - name: Export Expo web (static)
        working-directory: artifacts/fasting-tracker
        run: pnpm exec expo export -p web --output-dir dist --base-url /fast-app-minimalistic
        env:
          NODE_ENV: production

      - name: Add .nojekyll (allow _expo assets)
        run: touch artifacts/fasting-tracker/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/fasting-tracker/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
